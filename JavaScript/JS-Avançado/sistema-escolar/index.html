<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Escolar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light d-flex align-items-center justify-content-center vh-100">
    <div class="container" style="max-width: 400px;">
        <div class="card bg-secondary text-white border-0 shadow-lg p-4">
            <h1 class="text-center mb-1">Bem-vindo</h1>
            <p class="text-center text-light opacity-75 mb-4">Faça login no portal escolar</p>
            
            <form id="login-form">
                <div class="mb-3">
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" id="email" class="form-control" placeholder="nome@escola.com" required>
                </div>
                
                <div class="mb-4">
                    <label for="senha" class="form-label">Senha</label>
                    <input type="password" id="senha" class="form-control" placeholder="••••••••" required>
                    <div id="login-error" class="text-danger small mt-2 text-center" style="display: none;"></div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Entrar</button>
            </form>
        </div>
    </div>

    <script src="classes.js"></script>
    <script src="auth.js"></script>
</body>
</html>
