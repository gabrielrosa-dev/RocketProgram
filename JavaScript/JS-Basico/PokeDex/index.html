<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Falls Pokedex</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/index.css">
</head>
<body class="bg-dark text-light">
    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-3 fw-bold title-shadow mb-4">Gravity Falls</h1>
            <div class="d-flex justify-content-center gap-3 flex-wrap">
                <input type="text" id="search-bar" class="form-control custom-input" placeholder="Buscar personagem...">
                <select id="filter-select" class="form-select custom-select w-auto">
                    <option value="All">Todos</option>
                    <option value="Human">Humanos</option>
                    <option value="Demon">Demônios</option>
                    <option value="Animal">Animais</option>
                </select>
            </div>
        </header>
        
        <main>
            <div id="character-grid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4 character-grid">
            </div>
        </main>
    </div>    

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-card">
            <button id="close-modal-btn" class="close-modal-btn">&times;</button>
            <div class="modal-top-half">
                <img id="modal-image" src="" alt="" class="modal-image">
            </div>
            <div class="modal-bottom-half">
                <h2 id="modal-name" class="modal-name"></h2>
                <div><span id="modal-type" class="modal-type"></span></div>
                <p id="modal-description" class="modal-description"></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="index.js"></script>
</body>
</html>
