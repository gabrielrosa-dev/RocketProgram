<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Sistema Escolar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light">
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card bg-secondary text-white border-0 shadow-lg p-4 mb-4" id="profile-content">
            <!-- Conteúdo será inserido via JS -->
            <div class="text-center">
                <div class="spinner-border text-light" role="status">
                    <span class="visually-hidden">Carregando...</span>
                </div>
                <p class="mt-2">Carregando perfil...</p>
            </div>
        </div>
        
        <div class="text-center">
            <button class="btn btn-outline-danger px-4 py-2" onclick="logout()">Sair da Conta</button>
        </div>
    </div>

    <script src="classes.js"></script>
    <script src="perfil.js"></script>
</body>
</html>
